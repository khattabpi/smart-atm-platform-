apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: smart-atm
spec:
  replicas: 2
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: smart-atm-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.workers.main"]
          envFrom:
            - configMapRef: { name: smart-atm-config }
            - secretRef:    { name: smart-atm-secrets }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }