apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: smart-atm
spec:
  replicas: 1
  selector:
    matchLabels: { app: rabbitmq }
  template:
    metadata:
      labels: { app: rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            tcpSocket: { port: 5672 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: smart-atm
spec:
  selector: { app: rabbitmq }
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: mgmt
      port: 15672
      targetPort: 15672