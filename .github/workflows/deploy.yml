name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Backend CI/CD", "Frontend CI/CD"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: 🚀 Deploy to K8s
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tags
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s|smart-atm-backend:latest|${{ secrets.DOCKERHUB_USERNAME }}/smart-atm-backend:$SHA_TAG|g" k8s/06-backend-deployment.yaml
          sed -i "s|smart-atm-frontend:latest|${{ secrets.DOCKERHUB_USERNAME }}/smart-atm-frontend:$SHA_TAG|g" k8s/09-frontend-deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n smart-atm --timeout=5m
          kubectl rollout status deployment/frontend -n smart-atm --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n smart-atm
          kubectl get svc -n smart-atm